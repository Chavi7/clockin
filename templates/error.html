{% extends "base.html" %}
{% block title %}ERROR {{ code }}{% endblock %}
{% block body_class %}login-body{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card" style="text-align:center">
    <div class="login-stripe" style="background: var(--red)"></div>
    <h1 class="login-title">ERROR {{ code }}</h1>
    <p class="login-sub">{{ message }}</p>
    <a href="{{ url_for('dashboard') if current_user else url_for('kiosk') }}"
       class="btn btn-primary" style="margin-top: 1rem">GO HOME</a>
  </div>
</div>
{% endblock %}
